<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — บอร์ดเกมการเงิน (Web Prototype · Pro)</title>
<style>
  :root{
    --navy:#16244d; --navy2:#21356f; --gold:#e7b53c; --gold2:#caa128;
    --cream:#f6f1e4; --paper:#fffdf7; --ink:#1c2233; --muted:#6b7280;
    --green:#2e9e6b; --red:#d2553f; --blue:#3b6fb6; --line:#d8d2c0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Sarabun",system-ui,sans-serif;background:var(--navy);color:var(--ink);}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;background:var(--cream);box-shadow:0 0 40px rgba(0,0,0,.4);}
  header{background:var(--navy);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.5px}
  .brand .logo{height:34px;width:auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  .brand .brandtag{font-weight:400;font-size:11px;color:#9fb0e0}
  .brand .avatar{margin-left:auto;font-size:22px;background:var(--navy2);border:1.5px solid var(--gold);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
  .brand .avatar:empty{display:none}
  .dots{display:flex;gap:5px;align-items:center}
  .dots i{width:9px;height:9px;border-radius:50%;background:#3a5aa0;display:inline-block}
  .dots i.on{background:var(--gold)}
  .dots i.cur{background:var(--gold);box-shadow:0 0 0 3px rgba(231,181,60,.3)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
  .stat{background:var(--navy2);border-radius:8px;padding:6px 8px;text-align:center}
  .stat .l{font-size:10px;color:#aeb8d6;text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:17px;font-weight:700;color:#fff}
  .stat .v small{font-size:11px;color:var(--gold)}
  .roundbar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:#cdd5ee}
  .phasewrap{display:flex;gap:4px;margin-top:6px}
  .ph{flex:1;text-align:center;font-size:10px;padding:4px 2px;border-radius:6px;background:#2b3c74;color:#9fb0e0}
  .ph.active{background:var(--gold);color:var(--navy);font-weight:700}
  .ph.done{background:#3a5aa0;color:#dfe6fb}
  main{padding:16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 4px rgba(0,0,0,.04)}
  h2{margin:0 0 4px;font-size:18px;color:var(--navy)}
  .sub{font-size:13px;color:var(--muted);margin:0 0 12px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:9px;padding:11px 14px;font-size:14px;font-weight:600;transition:.15s}
  button:active{transform:translateY(1px)}
  .btn{background:var(--navy);color:#fff;width:100%}
  .btn:hover{background:var(--navy2)}
  .btn.gold{background:var(--gold);color:var(--navy)}
  .btn.gold:hover{background:var(--gold2)}
  .btn.ghost{background:transparent;border:1.5px solid var(--navy);color:var(--navy)}
  .btn.sm{width:auto;padding:7px 12px;font-size:13px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .shopgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .shop{border:1px solid var(--line);border-radius:10px;padding:8px;background:#fff;text-align:center;position:relative}
  .shop.sale{outline:2px solid var(--red)}
  .shop .emoji{font-size:26px}
  .shop .nm{font-size:12px;font-weight:600;margin:2px 0}
  .shop .pr{font-size:12px;color:var(--muted)}
  .shop .pr b{color:var(--navy)}
  .shop .acts{display:flex;gap:4px;margin-top:6px}
  .shop .acts button{flex:1;padding:6px 2px;font-size:11px}
  .saletag{position:absolute;top:-8px;right:-6px;background:var(--red);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px}
  .wcard{border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:7px;background:#fff;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .wcard.job{border-left:5px solid var(--blue)}
  .wcard.exp{border-left:5px solid var(--gold)}
  .wcard.done{opacity:.55;background:#eef6f0}
  .wcard .info{font-size:13px}
  .wcard .req{font-size:11px;color:var(--muted)}
  .pill{display:inline-block;background:#eee;border-radius:20px;padding:1px 8px;font-size:11px;margin:1px}
  .vp{font-weight:700;color:var(--green);font-size:13px;white-space:nowrap}
  .log{font-size:12px;color:#444;background:#efe9d8;border-radius:10px;padding:10px;max-height:150px;overflow-y:auto}
  .log div{padding:2px 0;border-bottom:1px dashed #d8cfb5}
  .log div:last-child{border:none}
  .note{font-size:12px;background:#fff7df;border:1px solid var(--gold);border-radius:8px;padding:8px 10px;color:#6b5616;margin-bottom:10px}
  .center{text-align:center}
  .hero{background:linear-gradient(160deg,#fffdf7,#f3edda);border:1px solid var(--gold)}
  .herologo{width:78%;max-width:340px;margin:4px auto 10px;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))}
  .shop .emoji{font-size:26px;line-height:1.1}
  .shop{border-top:3px solid var(--line)}
  .chipset{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
  .ichip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:20px;background:#eef0f4;border:1px solid #e0e3ea}
  .ichip.ok{background:#e4f6ec;border-color:#bfe6cf;color:#1f7a4d}
  .ichip.miss{background:#fdeee9;border-color:#f3cfc2;color:#b5462f}
  .iimg{vertical-align:middle;border-radius:5px;object-fit:cover;box-shadow:0 1px 2px rgba(0,0,0,.15)}
  .ownrow{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .itable{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
  .itable th{background:var(--navy);color:#fff;font-weight:600;font-size:11px;padding:5px 4px;text-align:center;line-height:1.2}
  .itable th span{font-weight:400;color:#aeb8d6;font-size:10px}
  .itable td{border:1px solid var(--line);padding:6px 4px;text-align:center;background:#fff}
  .itable td:first-child{font-weight:600;color:var(--navy);background:#faf7ec}
  .itable td.fdcol{color:var(--gold2)}
  .itable td.cur{background:#e4f6ec;font-weight:700;color:var(--green)}
  .itable td.fdcol.cur{background:#fff5d8;color:var(--gold2)}
  .itable td.fddim{color:#b9b08e;background:#f7f4ea}
  .sharewrap{margin-top:8px}
  #sharecard{width:100%;max-width:340px;height:auto;border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,.18)}
  .handbar{position:sticky;bottom:0;z-index:20;background:#1b2a55;border-top:2px solid var(--gold);padding:6px 8px 7px;box-shadow:0 -4px 14px rgba(0,0,0,.28)}
  .hbhead{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#cdd5ee;font-weight:700;padding:0 2px 5px}
  .hbhead .x{color:#9fb0e0;font-weight:400}
  .hbhead button{background:transparent;color:var(--gold);border:none;font-size:12px;padding:2px 8px;cursor:pointer;font-weight:700}
  .hbrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .mcard{flex:0 0 auto;min-width:92px;max-width:140px;background:#fffdf7;border-radius:8px;padding:5px 7px;border-left:4px solid var(--gold)}
  .mcard.job{border-left-color:var(--blue)}
  .mcard.ready{box-shadow:0 0 0 2px var(--green)}
  .mcard.cdone{background:#eef6f0;border-left-color:var(--green);opacity:.92}
  .mcard.cdone .mt{color:#1f7a4d}
  .hbsub{font-size:10px;color:#9fb0e0;padding:6px 2px 3px;border-top:1px dashed #3a5aa0;margin-top:6px}
  .lbtabs{display:flex;gap:6px;margin:6px 0 10px}
  .lbtabs button{flex:1;background:#eef0f4;color:var(--navy);border:1px solid var(--line);font-size:13px;padding:8px 4px}
  .lbtabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .lblist{display:flex;flex-direction:column;gap:4px}
  .lbrow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;background:#fff;border:1px solid var(--line)}
  .lbrow.top{background:#fffaf0;border-color:#f0e0b8}
  .lbrow.me{outline:2px solid var(--green);background:#eef9f2}
  .lbc{width:26px;display:flex;justify-content:center;flex:0 0 auto}
  .lbrk{font-weight:700;color:var(--muted);font-size:13px}
  .lbnm{flex:1;font-size:14px;font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbnm b{color:var(--green);font-size:11px}
  .lbsc{font-weight:800;color:var(--navy2);font-size:16px;flex:0 0 auto}
  .lbrow.top .lbsc{color:var(--gold2)}
  .crown{filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
  .mt{font-size:11px;font-weight:600;color:var(--navy);display:flex;justify-content:space-between;gap:6px;align-items:center;white-space:nowrap}
  .mt span{overflow:hidden;text-overflow:ellipsis}
  .mvp{color:var(--green);font-weight:700;flex:0 0 auto}
  .mis{display:flex;gap:4px;margin-top:4px}
  .mi{position:relative;line-height:0}
  .mi img{display:block;border-radius:5px}
  .mi:not(.ok) img{filter:grayscale(.85);opacity:.45}
  .mi.ok img{outline:2px solid var(--green);outline-offset:1px}
  .mi b{position:absolute;right:-4px;bottom:-4px;background:var(--navy);color:#fff;font-size:9px;line-height:1;border-radius:8px;padding:1px 3px}
  .shop .emoji .iimg{box-shadow:0 2px 4px rgba(0,0,0,.18)}
  .big{font-size:42px;font-weight:800;color:var(--navy)}
  .tier{font-size:20px;font-weight:700;color:var(--gold2);margin:6px 0}
  .inputrow{display:flex;align-items:center;gap:8px;margin:8px 0}
  .inputrow input{flex:1;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:15px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;z-index:50;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}
  .selcard{cursor:pointer;border:2px solid var(--line)}
  .selcard.sel{border-color:var(--gold);background:#fff7df}
  .legend{font-size:11px;color:var(--muted);margin-top:6px}
  .endscore{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;border-bottom:1px dashed var(--line)}
  footer{padding:14px 16px;text-align:center;font-size:11px;color:#9aa0ac;background:var(--navy);color:#8893b5}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="assets/wishlist-logo.png" alt="Wishlist" class="logo">
      <span class="brandtag">การเงิน · Pro</span>
      <span class="avatar" id="avatar"></span>
    </div>
    <div class="stats" id="stats"></div>
    <div class="roundbar">
      <span id="roundlbl">รอบ 1 / 5</span>
      <span class="dots" id="rounddots"></span>
      <span id="eventlbl"></span>
    </div>
    <div class="phasewrap" id="phasewrap"></div>
  </header>
  <main id="main"></main>
  <div id="handbar" class="handbar" style="display:none"></div>
  <footer>Prototype การเรียนรู้ · กติกาอ้างอิง Wishlist 2 Rulebook (Pro) · Wizards of Learning</footer>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ DATA (ของจริงจากไฟล์ production Wishlist 2 Retail) ============ */
// 9 ของจริงในกล่อง · ราคา buy/sell อ่านจาก artwork item board จริง (sell = buy-5; concert & trip ขายไม่ได้)

  concert:  {th:"ตั๋วคอนเสิร์ต",e:"🎫", sellable:false, buy:[7,8,9,10,12,14,14,14],       sell:[0,0,0,0,0,0,0,0]},
  trip:     {th:"ทริปท่องเที่ยว",e:"✈️", sellable:false, buy:[8,9,10,11,13,15,15,15],      sell:[0,0,0,0,0,0,0,0]},
  camera:   {th:"กล้อง",      e:"📷", sellable:true,  buy:[12,14,16,18,20,22,23,24],    sell:[7,9,11,13,15,17,18,19]},
  mobile:   {th:"สมาร์ตโฟน",  e:"📱", sellable:true,  buy:[14,16,18,20,22,24,25,26],    sell:[9,11,13,15,17,19,20,21]},
  computer: {th:"คอมพิวเตอร์", e:"💻", sellable:true,  buy:[16,18,20,22,24,26,27,28],    sell:[11,13,15,17,19,21,22,23]},
  motorbike:{th:"มอเตอร์ไซค์", e:"🏍️", sellable:true,  buy:[18,20,23,25,27,30,30,30],    sell:[13,15,18,20,22,25,25,25]},
};
const GOLD_LADDER=[20,23,26,29,32]; // ราคาทองจริงต่อรอบ (Round 1-5) จาก Gold board artwork; =5VP/ชิ้น
const ICOL={fashion:"#e58fb1",headset:"#c66",concert:"#8c5bd6",trip:"#3fae6a",camera:"#3b6fb6",mobile:"#5aa9c9",computer:"#7a5bd6",motorbike:"#d2553f"};
// ภาพ tile อุปกรณ์จริงจากกล่อง (8.Tokens)
function pic(t,s){return `<img class="iimg" src="assets/items/${t}.png" alt="" style="width:${s}px;height:${s}px">`;}
function reqChips(card){
  return `<div class="chipset">`+Object.entries(card.req).map(([t,n])=>{
    const have=itemCount(t), ok=have>=n;
    return `<span class="ichip ${ok?'ok':'miss'}">${pic(t,16)} ${ITEMS[t].th}${n>1?'×'+n:''} ${ok?'✓':have+'/'+n}</span>`;
  }).join('')+`</div>`;
}
// 40 Wishlist cards จริง (ชื่อ TH/EN + VP จริง + งาน/โบนัสจริง) · required items อิงธีมการ์ด
const WISHLIST=[
  {id:1, t:"exp", nm:"ดาวโรงเรียน", en:"School Celeb", req:{mobile:1}, vp:1},
  {id:2, t:"exp", nm:"ฟังเพลงชิวๆ", en:"Music Lover", req:{headset:1}, vp:2},

// 12 Objective cards จริง = "เงินเก็บจบเกม" (ต้องถือเงินถึงเป้าตอนจบ → VP)
const OBJECTIVES=[
  {nm:"กินบุฟเฟ่ต์", en:"Buffet Goal", cost:20, vp:3},
  {nm:"ตกแต่งห้อง", en:"Room Decor", cost:25, vp:4},

// ดอกเบี้ยเงินออม (Saving) — ตารางมาตรฐาน
function savingInterest(b){ if(b>=45)return 5; if(b>=35)return 4; if(b>=24)return 3; if(b>=15)return 2; if(b>=7)return 1; return 0; }
// ดอกเบี้ยฝากประจำ (Fixed Deposit) — กติกาจริง: 7-14→3, 15-23→5 และ 15-23 คือขั้นสูงสุด (สูงกว่านี้ยังได้ +5)
function fdInterest(b){ if(b>=15)return 5; if(b>=7)return 3; return 0; }
// ตารางดอกเบี้ยแสดงในหน้าจัดการเงิน (ไฮไลต์ช่วงของยอดปัจจุบัน)
const INT_BRACKETS=[[0,6],[7,14],[15,23],[24,34],[35,44],[45,Infinity]];
function interestTable(){
  const inb=(v,[lo,hi])=>v>=lo&&v<=hi;
  const rows=INT_BRACKETS.map(b=>{
    const label=b[1]===Infinity?`${b[0]}+`:`${b[0]}–${b[1]}`;
    const sv=savingInterest(b[0]), fd=fdInterest(b[0]);
    const curS=inb(S.saving,b), curF=inb(S.fd,b);
    const fdTop=b[0]>=24; // เกินขั้นสูงสุดของฝากประจำ (15-23) แล้ว
    return `<tr>
      <td>${label}</td>
      <td class="${curS?'cur':''}">+${sv}${curS?' ◀':''}</td>
      <td class="fdcol ${curF?'cur':''} ${fdTop?'fddim':''}">${fdTop?'+5':'+'+fd}${curF?' ◀':''}</td></tr>`;
  }).join('');
  return `<table class="itable">
    <thead><tr><th>ยอดที่ฝากไว้</th><th>ดอกเบี้ยเงินออม<br><span>(รอบหน้า)</span></th><th>ดอกฝากประจำ<br><span>🔒 (สูงกว่า)</span></th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="legend">ดอกเบี้ยคิดจาก<b>ยอดที่ฝากไว้ตอนนี้</b> แล้วได้รับ<b>รอบถัดไป</b> · แถวไฮไลต์ = ช่วงของคุณตอนนี้ (ออม ${S.saving} / ฝากประจำ ${S.fd})<br><b>ฝากประจำมีแค่ 2 ขั้น</b> (7–14→+3, 15–23→+5) · ยอด 15 ขึ้นไปได้ +5 สูงสุด (ไม่มีขั้นสูงกว่า)</div>`;
}

    log:[],
    stats:{ saveMoves:0, fdTotal:0, payLaterUsed:0, worked:0, shopped:0, sold:0, emergencyUsed:0, lottery:0 }
  };
  for(const k in ITEMS) S.markers[k]=0;
}
function logit(t){ S.log.unshift(t); }

/* ============ HELPERS ============ */
function itemCount(type){ // นับของทั้งหมด (รวม pay later) สำหรับเช็คทำ wishlist สำเร็จ
  let n=S.items.filter(i=>i.type===type).length + S.payLater.filter(p=>p.type===type).length;
  return n;
}
function moneyHeld(){ return S.cash+S.saving+S.fd; }
function netWorth(){ return moneyHeld()+S.gold*5; }
// Objective จริง = ต้องถือเงินถึงเป้าตอนจบ; เงินก้อนเดียวใช้ซ้ำไม่ได้ (ทำสำเร็จแบบ greedy)
function objectiveResult(){
  let remain=moneyHeld(), vp=0, done=[];
  [...S.objectives].sort((a,b)=>a.cost-b.cost).forEach(o=>{
    const ok=remain>=o.cost;
    if(ok){ remain-=o.cost; vp+=o.vp; }
    done.push({o,ok});
  });
  return {vp, done};
}
function estimateVP(){
  let v=0;
  S.done.forEach(c=>v+=c.vp);
  v+=objectiveResult().vp;
  v+=S.gold*5;
  v-=S.emergency*5;
  v-=S.hand.length; // -1 ต่อ wishlist ค้าง
  S.payLater.forEach(p=>v-=p.debt);
  return v;
}
function buyPrice(type){ let p=ITEMS[type].buy[S.markers[type]]; if(S.saleShop===type) p=Math.max(0,p-5); return p; }
function checkWishlist(){
  for(let i=S.hand.length-1;i>=0;i--){
    const c=S.hand[i];
    let ok=true;
    for(const t in c.req){ if(itemCount(t)<c.req[t]) ok=false; }
    if(ok){ S.done.push(c); S.hand.splice(i,1); toast("✓ ทำ Wishlist สำเร็จ: "+c.nm); }
  }
}
function hasAllItems(card){ for(const t in card.req){ if(itemCount(t)<card.req[t]) return false; } return true; }

function startRound(){ S.phase=0; S.event=null; S.saleShop=null; S.refilled=false; S.showHand=true; render(); phase1(); }

/* PHASE 1 — Receive income */
function phase1(){
  S.phase=0;
  // 1 รับเงิน +5
  S.cash+=5; logit(`รอบ ${S.round}: รับรายได้ +5`);
  // 2 ดอกเบี้ยเงินออม
  const si=savingInterest(S.saving); if(si){ S.cash+=si; logit(`ดอกเบี้ยเงินออม +${si} (จากเงินออม ${S.saving})`); }
  // 2.1 ดอกเบี้ยฝากประจำ
  const fi=fdInterest(S.fd); if(fi){ S.cash+=fi; logit(`ดอกเบี้ยฝากประจำ +${fi} (จาก FD ${S.fd})`); }
  // 2.2 จ่ายค่าถือครองผ่อน 1/ชิ้น
  if(S.payLater.length){ const c=Math.min(S.cash,S.payLater.length); S.cash-=c; logit(`จ่ายดอกผ่อน -${S.payLater.length} (${S.payLater.length} ชิ้น)`); if(c<S.payLater.length) logit('⚠️ เงินสดไม่พอจ่ายดอกผ่อนเต็ม'); }
  render();
  M().innerHTML=`<div class="card">
    <h2>ช่วงที่ 1 · รับรายได้</h2>
    <p class="sub">รับเงินประจำ + ดอกเบี้ย แล้วเลือกเติม Wishlist</p>

    <div style="margin-top:12px">${handHTML()}</div>

    <div class="row">
      <button class="btn ghost sm" onclick="refillDraw()" ${S.refilled||S.hand.length>=5||S.deck.length<1?'disabled':''}>จั่ว 2 เก็บ 1</button>
      <button class="btn gold" style="flex:1" onclick="phase2()">ไปจัดการเงิน →</button>
    </div>
  </div>`;
}
let drawChoice=null;
function refillDraw(){
  if(S.refilled||S.deck.length<1) return;
  const two=S.deck.splice(0,2);
  M().innerHTML=`<div class="card"><h2>จั่ว 2 เก็บ 1</h2><p class="sub">เลือกเก็บ 1 ใบ อีกใบกลับลงกอง</p>

    <div class="vp">+${c.vp} VP</div></div>`).join('')}</div>`;

}
function keepDraw(i){
  const keep=S._two[i], back=S._two[1-i];
  S.hand.push(keep); S.deck.push(back); S.refilled=true;
  logit('จั่ว Wishlist เพิ่ม: '+keep.nm);
  render(); phase1();
}

/* PHASE 2 — Manage money */
function phase2(){
  S.phase=1; render();
  drawPhase2();
}
function drawPhase2(){
  M().innerHTML=`<div class="card">

    <div class="inputrow"><span style="font-size:13px;width:120px">เงินสด → ฝากประจำ 🔒</span><input type="number" id="toFd" min="0" value="0"><button class="btn sm gold" onclick="moveMoney('fd')">ฝาก</button></div>

    ${objectiveResult().done.map(({o,ok})=>`<div class="wcard exp ${ok?'done':''}">
      <div class="info">${o.nm} <span class="pill">${o.en}</span><div class="req">ถือเงิน ${o.cost} ตอนจบ ${ok?' ✓ ถึงแล้ว':''}</div></div>

}
function moveMoney(kind){
  if(kind==='save'){ let v=Math.min(+document.getElementById('toSave').value||0,S.cash); S.cash-=v; S.saving+=v; if(v){S.stats.saveMoves+=v; logit(`ย้ายเข้าเงินออม ${v}`);} }
  if(kind==='unsave'){ let v=Math.min(+document.getElementById('fromSave').value||0,S.saving); S.saving-=v; S.cash+=v; if(v) logit(`ถอนเงินออม ${v}`); }
  if(kind==='fd'){ let v=Math.min(+document.getElementById('toFd').value||0,S.cash); S.cash-=v; S.fd+=v; if(v){S.stats.fdTotal+=v; logit(`ฝากประจำ ${v} 🔒`);} }
  render(); drawPhase2();
}
function rollEvent(){
  const d=1+Math.floor(Math.random()*6);
  S.eventPos=(S.eventPos+d)%EVENT_WHEEL.length;
  S.event=EVENT_WHEEL[S.eventPos];
  let msg=`🎲 ทอยได้ ${d} · เดินไปช่อง: ${EVENT_INFO[S.event].nm}`;
  // ผลทันที
  if(S.event==='lottery'){ S.cash+=2; S.stats.lottery++; msg+=' (+2)'; }
  if(S.event==='scam'){ const c=Math.min(S.cash,3); S.cash-=c; msg+=' (-3)'; }
  if(S.event==='badluck'){ const c=Math.min(S.cash,1); S.cash-=c; msg+=' (-1)'; }
  logit(msg); render();
  if(S.event==='onsale'){ chooseSale(); }
  else phase3();
}
function chooseSale(){
  M().innerHTML=`<div class="card"><h2>🏷️ ลดราคา</h2><p class="sub">เลือก 1 ร้านที่จะลดราคา 5 (เฉพาะจ่ายสดในรอบนี้)</p>
  <div class="shopgrid">${Object.keys(ITEMS).map(k=>`<div class="shop" style="border-top-color:${ICOL[k]}"><div class="emoji">${pic(k,40)}</div><div class="nm">${ITEMS[k].th}</div>
    <button class="btn sm gold" style="width:100%;margin-top:6px" onclick="setSale('${k}')">ลดร้านนี้</button></div>`).join('')}</div></div>`;
}
function setSale(k){ S.saleShop=k; logit('ลดราคาร้าน '+ITEMS[k].th+' -5 (จ่ายสด)'); phase3(); }

/* PHASE 3 — Fulfill Wishlist : Working หรือ Shopping */
function phase3(){
  S.phase=2; render();
  M().innerHTML=`<div class="card">
    <h2>ช่วงที่ 3 · เติม Wishlist</h2>
    <p class="sub">เลือกอย่างใดอย่างหนึ่งในรอบนี้</p>
    <div class="row">
      <button class="btn" style="flex:1" onclick="chooseWork()">🛠️ ทำงาน<br><small style="font-weight:400">รับ +10 + โบนัสการ์ดงาน</small></button>
      <button class="btn gold" style="flex:1" onclick="chooseShop()">🛍️ ช้อปปิ้ง<br><small style="font-weight:400">ซื้อของจ่ายสด/ผ่อน</small></button>
    </div>
    ${S.event==='online'?'<div class="note">📦 สั่งของออนไลน์: ถ้าเลือกทำงาน รอบนี้ซื้อของได้ 1 ชิ้น</div>':''}
    <div style="margin-top:10px">${handHTML()}</div>
    ${ownedHTML()}
  </div>`;
}
function chooseWork(){
  S.stats.worked++;
  let extra=0, details=[];
  S.done.forEach(c=>{ if(c.t==='job' && hasAllItems(c)){ extra+=c.extra; details.push(c.nm+' +'+c.extra); } });
  S.cash+=10+extra;
  logit(`ทำงาน +10${extra?(' + โบนัสงาน +'+extra+' ('+details.join(', ')+')'):''}`);
  render();
  if(S.event==='online'){ // ทำงานแล้วซื้อได้ 1 ชิ้น
    onlineBuyMode=true; toast('สั่งออนไลน์: ซื้อได้ 1 ชิ้น'); shoppingScreen(true);
  } else phase4();
}
let shopCount=0, onlineBuyMode=false;
function chooseShop(){ S.stats.shopped++; shopCount=0; onlineBuyMode=false; shoppingScreen(false); }
function shoppingScreen(online){
  S.phase=2; render();
  M().innerHTML=`<div class="card">
    <h2>${online?'📦 สั่งของออนไลน์ (1 ชิ้น)':'🛍️ ช้อปปิ้ง'}</h2>
    <p class="sub">${online?'เลือกซื้อได้ 1 ชิ้นแล้วจบช่วงนี้':'ซื้อได้หลายชิ้น (ทีละชิ้น) จ่ายสดหรือผ่อน · ซื้อแล้วราคาขึ้น'}</p>
    <div class="legend">เงินสด ${S.cash} · Pay Later เหลือ ${S.payTokens} โทเคน</div>
    ${shopHTML(true)}
    <div style="margin-top:12px">${handHTML()}</div>${ownedHTML()}
    <button class="btn gold" style="margin-top:12px" onclick="phase4()">จบการซื้อ → รับมือความเสี่ยง</button>
  </div>`;
}
function buyCash(type){
  const p=buyPrice(type); if(S.cash<p) return;
  S.cash-=p; S.items.push({type}); if(type!=='gold' && S.markers[type]<ITEMS[type].buy.length-1) S.markers[type]++;
  logit(`ซื้อ ${ITEMS[type].th} จ่ายสด ${p}`);
  S.saleShop=(S.saleShop===type)?null:S.saleShop; // sale ใช้ได้เรื่อยๆในรอบ? rulebook: ทั้งรอบ — คงไว้
  S.saleShop=S.saleShop; // keep
  checkWishlist(); afterBuy();
}
function buyLater(type){
  if(S.payTokens<=0) return;
  const p=ITEMS[type].buy[S.markers[type]]; // ผ่อนไม่ได้ส่วนลด sale
  S.payTokens--; S.payLater.push({type,debt:p}); S.stats.payLaterUsed++;
  if(S.markers[type]<ITEMS[type].buy.length-1) S.markers[type]++;
  logit(`ซื้อ ${ITEMS[type].th} แบบผ่อน (หนี้ ${p})`);
  checkWishlist(); afterBuy();
}
function buyGold(){
  const gp=GOLD_LADDER[S.goldIdx]; if(S.cash<gp) return;
  S.cash-=gp; S.gold++; logit(`ซื้อทอง จ่ายสด ${gp}`); afterBuy();
}
function afterBuy(){
  render();
  if(onlineBuyMode){ onlineBuyMode=false; phase4(); return; }
  shoppingScreen(false);
}

/* PHASE 4 — Confront risks */
function phase4(){
  S.phase=3; render();
  // 1 ค่าครองชีพ ทอยเต๋า
  M().innerHTML=`<div class="card center">
    <h2>ช่วงที่ 4 · รับมือความเสี่ยง</h2>
    <p class="sub">ทอยเต๋าค่าครองชีพ แล้วจ่ายตามแต้ม</p>
    <button class="btn gold" onclick="rollCost()">🎲 ทอยค่าครองชีพ</button>
  </div>`;
}
function rollCost(){
  const d=1+Math.floor(Math.random()*6);
  logit(`ค่าครองชีพรอบนี้: ${d}`);
  if(S.cash>=d){ S.cash-=d; logit(`จ่ายค่าครองชีพ -${d}`); render(); riskScreen(); }
  else { costShortfall(d); }
}
function costShortfall(d){
  render();
  const need=d-S.cash;
  M().innerHTML=`<div class="card">
    <h2>เงินสดไม่พอจ่ายค่าครองชีพ (${d})</h2>
    <p class="sub">มีเงินสด ${S.cash} ขาดอีก ${need} · เลือกวิธีจัดการ</p>
    <button class="btn" onclick="payFromSaving(${d})" ${S.saving+S.cash<d?'disabled':''}>ดึงจากเงินออม + เสียค่าปรับ 2</button>
    <div style="height:8px"></div>
    <button class="btn ghost" onclick="takeLoan(${d})">กู้ฉุกเฉิน (รับ 5 ทันที · -5 VP ตอนจบ)</button>
  </div>`;
}
function payFromSaving(d){
  S.cash-=Math.min(S.cash,d); let rem=d-Math.min(S.cash+0,d);
  // simpler: pay all cash then rest from saving + fine 2
  // recompute cleanly:
  let pay=d; let fromCash=Math.min(S.cash,pay); S.cash-=fromCash; pay-=fromCash;
  S.saving-=pay; S.saving-=2; if(S.saving<0)S.saving=0;
  logit(`จ่ายค่าครองชีพจากเงินออม + ค่าปรับ 2`);
  render(); riskScreen();
}
function takeLoan(d){
  S.cash+=5; S.emergency++; S.stats.emergencyUsed++;
  let fromCash=Math.min(S.cash,d); S.cash-=fromCash;
  logit(`กู้ฉุกเฉิน +5 (-5 VP) แล้วจ่ายค่าครองชีพ`);
  render(); riskScreen();
}
let soldThisRound=0;
function riskScreen(){
  S.phase=3; soldThisRound=soldThisRound; render();
  // ของที่ขายได้ (จ่ายสดแล้ว + sellable)
  const sellable=S.items.filter(i=>ITEMS[i.type].sellable);
  const counts={}; sellable.forEach(i=>counts[i.type]=(counts[i.type]||0)+1);
  M().innerHTML=`<div class="card">
    <h2>ขายของ & จ่ายค่างวด</h2>
    <p class="sub">ขายได้ไม่เกิน 2 ชิ้น/รอบ (ขายแล้วราคาบนกระดานไม่เปลี่ยน · ของผ่อน/ตั๋ว/ทริป ขายไม่ได้)</p>
    <div class="legend">ขายไปแล้วรอบนี้: ${soldThisRound}/2</div>
    ${Object.keys(counts).length?`<div class="shopgrid">${Object.keys(counts).map(t=>`
      <div class="shop" style="border-top-color:${ICOL[t]}"><div class="emoji">${pic(t,40)}</div><div class="nm">${ITEMS[t].th} ×${counts[t]}</div>
      <div class="pr">ขายได้ ${ITEMS[t].sell[S.markers[t]]}</div>
      <button class="btn sm ghost" style="width:100%;margin-top:6px" onclick="sellItem('${t}')" ${soldThisRound>=2?'disabled':''}>ขาย</button></div>`).join('')}</div>`
      :'<div class="legend">ไม่มีของที่ขายได้</div>'}
  </div>
  ${S.payLater.length?`<div class="card"><h2 style="font-size:15px">จ่ายค่างวด (ปิดหนี้ผ่อน)</h2>
    <p class="sub">จ่ายเต็มเพื่อปิดหนี้ คืนโทเคน · หนี้ที่ค้างตอนจบ = -VP เท่าราคา</p>
    ${S.payLater.map((p,i)=>`<div class="wcard"><div class="info">${pic(p.type,20)} ${ITEMS[p.type].th} · หนี้ ${p.debt}</div>
      <button class="btn sm gold" onclick="payInstall(${i})" ${S.cash<p.debt?'disabled':''}>จ่าย ${p.debt}</button></div>`).join('')}
  </div>`:''}
  <button class="btn gold" onclick="endRound()">จบรอบ ${S.round} →</button>`;
}
function sellItem(type){
  if(soldThisRound>=2) return;
  const idx=S.items.findIndex(i=>i.type===type); if(idx<0) return;
  const get=ITEMS[type].sell[S.markers[type]];
  S.items.splice(idx,1); S.cash+=get; soldThisRound++; S.stats.sold++;
  logit(`ขาย ${ITEMS[type].th} ได้ ${get}`);
  render(); riskScreen();
}
function payInstall(i){
  const p=S.payLater[i]; if(S.cash<p.debt) return;
  S.cash-=p.debt; S.payTokens++; S.payLater.splice(i,1);
  S.items.push({type:p.type}); // กลายเป็นของจ่ายเต็ม (ขายได้รอบหน้า)
  logit(`ปิดหนี้ผ่อน ${ITEMS[p.type].th} จ่าย ${p.debt}`);
  render(); riskScreen();
}
function endRound(){
  // ทองราคาขึ้นทุกจบรอบ
  if(S.goldIdx<GOLD_LADDER.length-1) S.goldIdx++;
  soldThisRound=0;
  if(S.round>=5){ endGame(); return; }
  S.round++; logit(`— จบรอบ เริ่มรอบ ${S.round} —`);
  startRound();
}

    <h2 style="font-size:15px;margin-top:4px">สไตล์การเล่นรอบนี้ <span style="font-weight:400;font-size:12px;color:var(--muted)">(วิเคราะห์จากวิธีเล่นจริง)</span></h2>
    <div class="tier" style="font-size:18px">${persona.name}</div>
    <p class="sub">${persona.desc}</p>
    <div class="legend">เงินคงเหลือสุทธิ: ${netWorth()} · ออมสะสม ${S.stats.saveMoves} · ฝากประจำ ${S.stats.fdTotal} · ใช้ผ่อน ${S.stats.payLaterUsed} ครั้ง · ทำงาน ${S.stats.worked} · ช้อป ${S.stats.shopped}</div>
  </div>

      <button class="btn gold" style="flex:1" onclick="doShare()">📤 แชร์ผล</button>
      <button class="btn ghost" style="flex:1" onclick="saveShareImage()">💾 บันทึกรูป</button>
    </div>
    <button class="btn ghost" style="margin-top:8px" onclick="copyResult()">🔗 คัดลอกลิงก์ชวนเล่น</button>
  </div>
  <div class="card center">
    <button class="btn gold" onclick="screenStart()">เล่นอีกครั้ง</button>
    <div style="height:8px"></div>
    <a href="https://wizardsoflearning.com/wishlist-financial-board-game/" target="_blank" style="text-decoration:none"><button class="btn ghost">รู้จักบอร์ดเกมตัวจริง →</button></a>
  </div>`;
  document.getElementById('phasewrap').innerHTML='';
  drawShareCard();
  lbHighlight=null; lbTab='daily'; renderLbBox();
}

/* ===== SHARE RESULT ===== */
const GAME_URL="https://wollab.github.io/WoL_GameLab/wishlist/";
function shareText(){
  const r=S.result; const b=r.breakdown;
  const c=r.character?`ตัวละคร: ${r.character.e} ${r.character.nm} · ${r.character.th}\n`:'';
  return `ผมเล่น Wishlist บอร์ดเกมการเงิน ได้ ${r.total} VP — "${r.tier}"\n`+
    `สไตล์การเล่น: ${r.persona.name}\n${c}`+
    `• Wishlist สำเร็จ ${r.doneCount} ใบ (+${b.wl})  • Objective +${b.obj}  • ทอง +${b.gold}\n`+
    `มาลองจัดการเงินดูบ้าง 👇\n${GAME_URL}`;
}
function drawShareCard(cb){
  const cv=document.getElementById('sharecard'); if(!cv) return;
  const x=cv.getContext('2d'), W=cv.width, H=cv.height, r=S.result;
  // พื้นหลัง navy + การ์ดครีม
  const g=x.createLinearGradient(0,0,0,H); g.addColorStop(0,'#16244d'); g.addColorStop(1,'#21356f');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  x.fillStyle='#f6f1e4'; roundRect(x,26,26,W-52,H-52,22); x.fill();
  const cx=W/2;
  // โลโก้
  const logo=new Image();
  function paint(){
    if(logo.complete && logo.naturalWidth) x.drawImage(logo, cx-110, 50, 220, 220*logo.naturalHeight/logo.naturalWidth);
    let ly=logo.naturalWidth? 50+220*logo.naturalHeight/logo.naturalWidth+6 : 70;
    // ตัวละคร
    x.textAlign='center';
    if(r.character){ x.font='44px sans-serif'; x.fillText(r.character.e, cx, ly+44); ly+=58;
      x.fillStyle='#16244d'; x.font='bold 18px "Segoe UI",sans-serif'; x.fillText(r.character.nm.replace(/"/g,''), cx, ly); ly+=20;
      x.fillStyle='#6b7280'; x.font='14px "Segoe UI",sans-serif'; x.fillText(r.character.th, cx, ly); ly+=24; }
    // VP ใหญ่
    x.fillStyle='#16244d'; x.font='800 78px "Segoe UI",sans-serif'; x.fillText(r.total, cx, ly+66);
    x.fillStyle='#caa128'; x.font='bold 20px "Segoe UI",sans-serif'; x.fillText('VICTORY POINTS', cx, ly+92);
    ly+=120;
    // tier
    x.fillStyle='#caa128'; x.font='bold 22px "Segoe UI",sans-serif'; x.fillText(r.tier, cx, ly); ly+=34;
    // persona
    x.fillStyle='#16244d'; x.font='bold 16px "Segoe UI",sans-serif';
    wrapText(x, 'สไตล์การเล่น: '+r.persona.name, cx, ly, W-90, 22); ly+=26;
    x.fillStyle='#6b7280'; x.font='13px "Segoe UI",sans-serif';
    ly=wrapText(x, r.persona.desc, cx, ly, W-90, 18)+16;
    // ตารางคะแนนละเอียด
    const b=r.breakdown;
    const rows=[
      ['Wishlist สำเร็จ '+r.doneCount+' ใบ', b.wl, false],
      ['Objective สำเร็จ', b.obj, false],
      ['ทอง '+r.gold+' ×5', b.gold, false],
      ['กู้ฉุกเฉิน', b.emg, true],
      ['Wishlist ค้าง', b.unc, true],
      ['หนี้ผ่อนค้าง', b.debt, true],
    ];
    const lx=58, rx=W-58, rh=22;
    rows.forEach(([lab,val,neg])=>{
      x.textAlign='left'; x.fillStyle='#444'; x.font='13px "Segoe UI",sans-serif'; x.fillText(lab, lx, ly);
      x.textAlign='right'; x.fillStyle=(val<0?'#d2553f':'#2e9e6b'); x.font='bold 13px "Segoe UI",sans-serif';
      x.fillText((val>0?'+':'')+val, rx, ly);
      x.strokeStyle='#e5dfc9'; x.lineWidth=1; x.beginPath(); x.moveTo(lx,ly+6); x.lineTo(rx,ly+6); x.stroke();
      ly+=rh;
    });
    x.textAlign='left'; x.fillStyle='#16244d'; x.font='bold 14px "Segoe UI",sans-serif'; x.fillText('รวม', lx, ly+4);
    x.textAlign='right'; x.fillStyle='#16244d'; x.font='bold 15px "Segoe UI",sans-serif'; x.fillText(r.total+' VP', rx, ly+4); ly+=20;
    x.textAlign='center';
    // CTA
    x.fillStyle='#16244d'; roundRect(x,40,H-92,W-80,42,12); x.fill();
    x.fillStyle='#e7b53c'; x.font='bold 14px "Segoe UI",sans-serif';
    x.fillText('▶ ลองเล่น Wishlist · wollab.github.io/WoL_GameLab', cx, H-65);
    if(cb) cb();
  }
  logo.onload=paint; logo.onerror=paint; logo.src='assets/wishlist-logo.png';
  if(logo.complete) paint();
}
function roundRect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function wrapText(x,t,cx,y,maxw,lh){const words=t.split(' ');let line='',yy=y;for(const w of words){const test=line+w+' ';if(x.measureText(test).width>maxw&&line){x.fillText(line.trim(),cx,yy);line=w+' ';yy+=lh;}else line=test;}x.fillText(line.trim(),cx,yy);return yy;}
function canvasBlob(){return new Promise(res=>document.getElementById('sharecard').toBlob(res,'image/png'));}
async function doShare(){
  try{
    const blob=await canvasBlob();
    const file=new File([blob],'wishlist-result.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], text:shareText()}); return;
    }
    if(navigator.share){ await navigator.share({text:shareText(), url:GAME_URL}); return; }
    copyResult();
  }catch(e){ if(e.name!=='AbortError') copyResult(); }
}
function saveShareImage(){
  const a=document.createElement('a');
  a.download='wishlist-result.png';
  a.href=document.getElementById('sharecard').toDataURL('image/png');
  a.click(); toast('บันทึกรูปผลแล้ว');
}
function copyResult(){
  const t=shareText();
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('คัดลอกข้อความ + ลิงก์แล้ว')); }
  else toast('คัดลอกไม่ได้ในเบราว์เซอร์นี้');
}
// "สไตล์การเล่นรอบนี้" — คำนวณจากพฤติกรรมจริง (คนละชุดกับตัวละครที่เลือก เพื่อไม่ให้สับสน)
function getPersona(){
  const s=S.stats;
  const styles=[
    {score:(s.fdTotal+s.saveMoves), name:"💰 สายวางแผนเก็บออม",
      desc:"ออมและลงทุนอย่างมีวินัย มองยาวเป็น — ระวังเก็บจนพลาดโอกาสทำฝัน"},
    {score:s.payLaterUsed*6 + (s.payLaterUsed && S.payLater.length===0 ? 8 : 0), name:"💳 นักบริหารหนี้",
      desc:"กล้าใช้เครื่องมือผ่อนและปิดหนี้ได้ทัน — ใช้หนี้เป็นเครื่องมือ"},
    {score:s.emergencyUsed*7, name:"🎢 สายผจญภัยการเงิน",
      desc:"กล้าเสี่ยง เจอค่าใช้จ่ายฉุกเฉินบ้าง — ลองกันเงินสำรองเพิ่มอีกหน่อย"},
    {score:S.done.length*4, name:"🌟 นักเติมฝัน",
      desc:"ไล่ทำ Wishlist ได้เยอะ — เก่งเรื่องจัดลำดับความสำคัญของเป้าหมาย"},
    {score:s.shopped*3, name:"🛍️ นักช้อปตัวจริง",
      desc:"เปลี่ยนเงินเป็นของที่อยากได้บ่อย — อย่าลืมกันเงินเก็บไว้ด้วย"},
  ];
  let best=styles[0]; styles.forEach(st=>{ if(st.score>best.score) best=st; });
  return {name:best.name, desc:best.desc};
}

/* ============ LEADERBOARD ============ */
// ตั้งค่า Supabase ที่นี่เพื่อเปิดโหมด "แชร์ทุกคน" (ว่าง = เก็บในเครื่อง localStorage)
const LB_CONFIG={ url:"https://ogxjhyysevcjljjmjham.supabase.co", key:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9neGpoeXlzZXZjamxqam1qaGFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDQxMzIsImV4cCI6MjA5NzEyMDEzMn0.m8ucxizELASG_6wQig7M4Gz4fwOsQP8etvPoRcBB6jI", table:"scores" };
function lbRemote(){ return !!(LB_CONFIG.url && LB_CONFIG.key); }
let lbTab='daily', lbHighlight=null;
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function lbLocal(){ try{return JSON.parse(localStorage.getItem('wishlist_scores_v1'))||[];}catch(e){return[];} }
function lbLocalSave(a){ try{localStorage.setItem('wishlist_scores_v1',JSON.stringify(a.slice(-300)));}catch(e){} }
async function lbFetch(mode){
  if(lbRemote()){
    let q=`${LB_CONFIG.url}/rest/v1/${LB_CONFIG.table}?select=name,score,emoji,created_at&order=score.desc&limit=50`;
    if(mode==='daily'){ const t=new Date(); t.setHours(0,0,0,0); q+=`&created_at=gte.${encodeURIComponent(t.toISOString())}`; }
    const r=await fetch(q,{headers:{apikey:LB_CONFIG.key,Authorization:'Bearer '+LB_CONFIG.key}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return (await r.json()).map(e=>({name:e.name,score:e.score,char:e.emoji})).sort((a,b)=>b.score-a.score);
  }
  let all=lbLocal(); if(mode==='daily') all=all.filter(e=>e.date===todayStr());
  return all.sort((a,b)=>b.score-a.score);
}
async function lbAdd(entry){
  if(lbRemote()){
    const r=await fetch(`${LB_CONFIG.url}/rest/v1/${LB_CONFIG.table}`,{method:'POST',
      headers:{apikey:LB_CONFIG.key,Authorization:'Bearer '+LB_CONFIG.key,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({name:entry.name,score:entry.score,emoji:entry.char})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return;
  }
  const all=lbLocal(); all.push(entry); lbLocalSave(all);
}
function crown(rank){
  const col={1:'#e7b53c',2:'#aab4c2',3:'#c0814e'}[rank];
  if(!col) return `<span class="lbrk">${rank}</span>`;
  return `<svg class="crown" viewBox="0 0 24 22" width="20" height="18"><path d="M2 19h20l-1.6-11.5-5.4 4.2L12 4l-3 7.7-5.4-4.2z" fill="${col}" stroke="rgba(0,0,0,.25)" stroke-width=".7" stroke-linejoin="round"/><rect x="2" y="19" width="20" height="2.4" rx="1" fill="${col}"/></svg>`;
}
function lbTableHTML(list, hi){
  if(!list || !list.length) return `<div class="legend" style="text-align:center;padding:14px">ยังไม่มีคะแนน — เป็นคนแรกบนกระดานเลย! 🏆</div>`;
  const matchHi=(e)=> hi && e.name===hi.name && e.score===hi.score;
  let myRank=-1; list.forEach((e,i)=>{ if(myRank<0 && matchHi(e)) myRank=i+1; });
  const rows=list.slice(0,15).map((e,i)=>{
    const rank=i+1, me=matchHi(e)&&(rank===myRank);
    return `<div class="lbrow ${rank<=3?'top':''} ${me?'me':''}">
      <span class="lbc">${crown(rank)}</span>
      <span class="lbnm">${e.char||'🎮'} ${escapeHtml(e.name)}${me?' <b>(คุณ)</b>':''}</span>
      <span class="lbsc">${e.score}</span></div>`;
  }).join('');
  const extra=(myRank>15)?`<div class="lbrow me"><span class="lbc"><span class="lbrk">${myRank}</span></span><span class="lbnm">${escapeHtml(hi.name)} <b>(คุณ)</b></span><span class="lbsc">${hi.score}</span></div>`:'';
  return `<div class="lblist">${rows}${extra}</div>`;
}
function lbTabsHTML(){
  return `<div class="lbtabs">
    <button class="${lbTab==='daily'?'on':''}" onclick="setLbTab('daily')">📅 อันดับวันนี้</button>
    <button class="${lbTab==='all'?'on':''}" onclick="setLbTab('all')">👑 สูงสุดตลอดกาล</button></div>`;
}
function setLbTab(t){ lbTab=t; renderLbBox(); }
async function renderLbBox(){
  const el=document.getElementById('lbbox'); if(!el) return;
  el.innerHTML=lbTabsHTML()+`<div class="legend" style="text-align:center;padding:12px">กำลังโหลด…</div>`;
  try{ const list=await lbFetch(lbTab); el.innerHTML=lbTabsHTML()+lbTableHTML(list,lbHighlight); }
  catch(e){ el.innerHTML=lbTabsHTML()+`<div class="legend" style="text-align:center;padding:10px">โหลดอันดับไม่ได้ (${escapeHtml(e.message)})</div>`; }
  const mode=lbRemote()?'':'<div class="legend" style="margin-top:6px">📱 โหมดเก็บในเครื่อง (ยังไม่ได้ต่อ backend แชร์)</div>';
  el.insertAdjacentHTML('beforeend',mode);
}
async function saveScore(){
  const inp=document.getElementById('lbname'); if(!inp) return;
  const nm=(inp.value||'ผู้เล่น').trim().slice(0,16)||'ผู้เล่น';
  try{ localStorage.setItem('wishlist_name',nm); }catch(e){}
  const entry={name:nm, score:S.result.total, char:S.character?S.character.e:'🎮', date:todayStr()};
  const btn=document.querySelector('#lbsave button'); if(btn){btn.disabled=true;btn.textContent='กำลังบันทึก…';}
  try{ await lbAdd(entry); lbHighlight={name:nm,score:entry.score}; }
  catch(e){ if(btn){btn.disabled=false;btn.textContent='ลองใหม่';} toast('บันทึกไม่สำเร็จ: '+e.message); return; }
  const sv=document.getElementById('lbsave'); if(sv) sv.innerHTML=`<div class="legend" style="color:var(--green)">✓ บันทึก ${entry.score} VP เป็น "${escapeHtml(nm)}" แล้ว</div>`;
  renderLbBox();
}
function screenLeaderboard(){
  M().innerHTML=`<div class="card">
    <h2>🏆 กระดานอันดับ</h2>
    <p class="sub">คะแนนสูงสุดของผู้เล่น Wishlist</p>
    <div id="lbbox"></div>
    <button class="btn ghost" style="margin-top:12px" onclick="screenStart()">← กลับหน้าแรก</button>
  </div>`;
  document.getElementById('stats').innerHTML='';
  document.getElementById('phasewrap').innerHTML='';
  document.getElementById('rounddots').innerHTML='';
  document.getElementById('avatar').textContent='';
  document.getElementById('roundlbl').textContent='กระดานอันดับ';
  document.getElementById('eventlbl').textContent='';
  lbHighlight=null; renderLbBox();
}
